services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - /opt/data/paperclip-db:/var/lib/postgresql/data
    networks:
      - paperclip-net

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PORT: "3100"
      HOST: "0.0.0.0"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PAPERCLIP_INSTANCE_BRANDING: ${PAPERCLIP_INSTANCE_BRANDING:-}
      PAPERCLIP_BRAND_NAME: ${PAPERCLIP_BRAND_NAME:-}
      PAPERCLIP_BRAND_SHORT_NAME: ${PAPERCLIP_BRAND_SHORT_NAME:-}
      PAPERCLIP_BRAND_REVISION: ${PAPERCLIP_BRAND_REVISION:-}
    volumes:
      - /opt/data/paperclip:/paperclip
    depends_on:
      db:
        condition: service_healthy
    networks:
      - paperclip-net
      - web
      - runner-net

  claude-runner:
    build:
      context: .
      dockerfile: Dockerfile.claude-runner
    restart: unless-stopped
    hostname: claude-runner
    volumes:
      - /opt/data/claude-runner-home:/home/runner
    networks:
      - runner-net
    # No host port exposure. The paperclip server reaches it via the
    # runner-net Docker network on `claude-runner:22`.

networks:
  paperclip-net:
    internal: true
  web:
    name: web
    external: true
  runner-net:
    # Not internal — claude-runner needs outbound internet for MCPs, Slack/Gmail
    # APIs, model providers, etc. Server reaches runner on this bridge.
    driver: bridge
